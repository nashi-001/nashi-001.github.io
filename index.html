<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="常用漢字2136字の練習用ウェブアプリ - 学年別に漢字の書き取り練習ができます">
    <title>漢字練習 - 常用漢字2136</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== 学年選択画面 ===== -->
    <div id="grade-select-screen" class="screen">
        <div class="screen-header">
            <h1 id="app-title">漢字練習</h1>
            <p class="subtitle">常用漢字 2136字</p>
        </div>
        <div id="grade-buttons" class="grade-grid"></div>
        <div class="bottom-actions">
            <button id="start-btn" class="primary-btn" disabled onclick="startPractice()">学年を選択してください</button>
            <button id="stats-btn" class="secondary-btn" onclick="showStatsScreen()">📊 成績を見る</button>
        </div>
    </div>

    <!-- ===== 練習画面 ===== -->
    <div id="practice-screen" class="screen hidden">
        <!-- トップバー -->
        <div id="top-bar">
            <button id="back-btn" onclick="event.stopPropagation(); goBack()">← 戻る</button>
            <div id="kanji-info"></div>
        </div>

        <!-- 進捗バー -->
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
            <span id="progress-text">0 / 0</span>
        </div>

        <!-- メイン表示エリア -->
        <div id="sentence-area">
            <div id="sentence-display"></div>
            <div id="hint-text">タップで漢字を表示・非表示</div>
        </div>

        <!-- ボタンエリア -->
        <div id="button-area">
            <button id="btn-fail" class="action-btn fail" onclick="event.stopPropagation(); handleResult('fail')">
                <span class="btn-icon">✕</span>
                <span class="btn-label">失敗</span>
            </button>
            <button id="btn-select" class="action-btn select" onclick="event.stopPropagation(); openSelector()">
                <span class="btn-icon">◎</span>
                <span class="btn-label">漢字の位置の選択</span>
            </button>
            <button id="btn-success" class="action-btn success"
                onclick="event.stopPropagation(); handleResult('success')">
                <span class="btn-icon">○</span>
                <span class="btn-label">成功</span>
            </button>
        </div>
    </div>

    <!-- ===== 統計画面 ===== -->
    <div id="stats-screen" class="screen hidden">
        <div id="stats-top-bar">
            <button onclick="event.stopPropagation(); backToGradeSelectFromStats()">← 戻る</button>
            <h2>学習統計</h2>
        </div>
        <div id="stats-content"></div>
    </div>

    <!-- 漢字選択モーダル -->
    <div id="selector-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeSelector()"></div>
        <div class="modal-content">
            <h2>書きたい漢字を選んでください</h2>
            <div id="kanji-options"></div>
            <button class="modal-close" onclick="closeSelector()">閉じる</button>
        </div>
    </div>

    <!-- 完了画面 -->
    <div id="complete-screen" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content complete-content">
            <div class="complete-icon">🎉</div>
            <h2>練習完了！</h2>
            <div id="result-summary"></div>
            <div class="complete-actions">
                <button class="modal-close restart-btn"
                    onclick="event.stopPropagation(); restartPractice()">もう一度</button>
                <button class="modal-close back-btn"
                    onclick="event.stopPropagation(); backToGradeSelect()">学年選択に戻る</button>
            </div>
        </div>
    </div>

    <script src="kanji_database.js"></script>
    <script src="sentence_pool.js"></script>
    <script src="script.js"></script>
</body>

</html>
